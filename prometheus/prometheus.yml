global:
  scrape_interval: 15s # Por padrão, raspa os alvos a cada 15 segundos.

scrape_configs:
  - job_name: 'finanbot'
    metrics_path: '/actuator/prometheus' # Endpoint do Spring Boot Actuator para métricas
    static_configs:
      - targets: ['finanbot-app:8080'] # O nome do serviço no docker-compose e a porta
