spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finanbot}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate 

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

telegram.bot.username=${TELEGRAM_BOT_USERNAME:SeuBotUsername}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

jwt.secret=${JWT_SECRET:secret}
jwt.expiration=${JWT_EXPIRATION:86400000}