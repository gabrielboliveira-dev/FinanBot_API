server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Adiciona o nome do contêiner como um label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Adiciona o nome do serviço do docker-compose como um label
      - source_labels: ['__meta_docker_compose_service']
        target_label: 'service'
      # Adiciona o ID do contêiner como um label
      - source_labels: ['__meta_docker_container_id']
        target_label: 'instance'
      # Filtra para incluir apenas os logs dos nossos serviços
      - source_labels: ['__meta_docker_container_name']
        regex: '/(finanbot-app|finanbot-ml-service|finanbot-db|finanbot-mq|finanbot-prometheus|finanbot-grafana|finanbot-loki)'
        action: keep
